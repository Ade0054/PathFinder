# Copy this file to application.yml and fill in your real values.
# application.yml is gitignored so your secrets never reach GitHub.
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true

spring:
  application:
    name: pathfinder
  datasource:
    url: jdbc:postgresql://localhost:5432/pathfinder
    username: postgres
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: false

pathfinder:
  ai:
    gemini:
      api-key: YOUR_GEMINI_KEY
      model: gemini-2.5-flash-lite
      enabled: false
